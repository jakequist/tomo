# cargo-deny configuration — enforce MIT-compatible licensing and sane deps.
# Run: cargo deny check   (install: cargo install cargo-deny)
[licenses]
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Zlib", "Unicode-3.0", "MPL-2.0", "CC0-1.0"]

[bans]
multiple-versions = "warn"
# No OpenSSL — musl static builds + rustls policy (docs/SPEC.md §3).
deny = [{ name = "openssl" }, { name = "openssl-sys" }]

[advisories]
yanked = "deny"
